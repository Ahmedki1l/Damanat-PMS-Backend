# Docker Compose for local development (MongoDB + PostgreSQL)
# Run: docker-compose up -d

services:
  mongo:
    image: mongo:7
    container_name: damanat-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: damanat_pms

  postgres:
    image: postgres:16
    container_name: damanat-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: damanat
      POSTGRES_PASSWORD: damanat
      POSTGRES_DB: damanat_db

volumes:
  mongo_data:
  postgres_data:
